<?xml version='1.0' encoding='UTF-8' ?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                template="/template.xhtml">
    
    <ui:define name="content">
        <div class="flex flex-column align-items-center justify-content-center py-8">
            <div class="card-premium" style="width: 100%; max-width: 460px">
                <div class="text-center mb-6">
                    <i class="bi bi-person-plus text-7xl text-primary mb-3"></i>
                    <h1 class="text-4xl font-black text-gray-900 mb-2">Join ReVive</h1>
                    <p class="text-gray-500 font-medium">Create an account to start buying and selling.</p>
                </div>

                <h:form id="registerForm">
                    <div class="field mb-4">
                        <p:outputLabel for="name" value="Full Name" styleClass="block mb-2 font-bold text-gray-700" />
                        <p:inputText id="name" value="#{authBean.newUser.username}" required="true" placeholder="Enter your name" />
                    </div>

                    <div class="field mb-4">
                        <p:outputLabel for="email" value="Email Address" styleClass="block mb-2 font-bold text-gray-700" />
                        <p:inputText id="email" value="#{authBean.newUser.email}" required="true" placeholder="your@email.com" />
                    </div>

                    <div class="field mb-6">
                        <p:outputLabel for="password" value="Password" styleClass="block mb-2 font-bold text-gray-700" />
                        <p:password id="password" value="#{authBean.newUser.password}" required="true" placeholder="••••••••" toggleMask="true" />
                    </div>

                    <div class="hidden">
                        <h:inputText value="#{authBean.selectedRoleId}" />
                    </div>

                    <p:commandButton value="Create Account" action="#{authBean.register}" 
                                   styleClass="ui-button-primary w-full shadow-4" />

                    <div class="text-center mt-8 pt-4 border-top-1 border-gray-100">
                        <span class="text-sm text-gray-400 font-semibold">Already have an account? </span>
                        <h:link outcome="login" value="Login here" styleClass="text-sm font-bold text-primary no-underline hover:underline" />
                    </div>
                </h:form>
            </div>
        </div>
    </ui:define>
</ui:composition>
