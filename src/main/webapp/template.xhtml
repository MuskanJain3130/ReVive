<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>ReVive - 2nd Hand Marketplace</title>
        <h:outputStylesheet library="webjars" name="primeflex/3.3.1/primeflex.min.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
        <style>
            :root {
                --primary-color: #2563eb;
                --primary-hover: #1d4ed8;
                --bg-light: #f8fafc;
            }
            body { margin: 0; background: var(--bg-light); font-family: 'Inter', -apple-system, sans-serif; color: #1e293b; }
            .navbar { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); padding: 1rem 2rem; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #e2e8f0; }
            .brand { color: var(--primary-color); font-size: 1.5rem; font-weight: 800; text-decoration: none; display: flex; align-items: center; letter-spacing: -0.025em; }
            .nav-links { display: flex; gap: 1.5rem; align-items: center; }
            .nav-item { color: #64748b; text-decoration: none; font-weight: 600; font-size: 0.875rem; transition: all 0.2s; }
            .nav-item:hover { color: var(--primary-color); }
            .btn-revive { background: var(--primary-color); color: white !important; border-radius: 0.75rem; padding: 0.625rem 1.25rem; font-weight: 700; transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.1); border: none; }
            .btn-revive:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); text-decoration: none; }
            .footer { background: #0f172a; color: white; padding: 4rem 2rem; text-align: center; }
            .p-container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; min-height: 75vh; }
            
            /* Holistic UI Perfection */
            .ui-inputfield { width: 100% !important; padding: 0.625rem 0.875rem !important; border-radius: 0.75rem !important; border: 1px solid #e2e8f0 !important; background: #ffffff !important; transition: all 0.2s !important; font-size: 0.95rem !important; color: #1e293b !important; }
            .ui-inputfield:focus { border-color: var(--primary-color) !important; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1) !important; outline: none !important; }
            .ui-spinner-input { padding-right: 1.5rem !important; height: 2.5rem !important; text-align: center !important; font-weight: 700 !important; font-size: 1rem !important; }
            .ui-spinner-button { width: 1.5rem !important; padding: 0 !important; }
            .ui-spinner-button .ui-icon { font-size: 0.75rem !important; margin-top: -0.375rem !important; }
            .ui-button { border-radius: 0.75rem !important; padding: 0.75rem 1.5rem !important; font-weight: 700 !important; transition: all 0.2s !important; }
            .ui-button-primary { background: var(--primary-color) !important; border: none !important; }
            .ui-button-primary:hover { background: var(--primary-hover) !important; transform: translateY(-1px) !important; }
            
            .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; line-clamp: 1; }
            .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-clamp: 2; }
            .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; line-clamp: 3; }
            
            .card-premium { background: white; border-radius: 1.5rem; padding: 1.25rem; border: 1px solid #f1f5f9; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; height: 100%; }
            .card-premium:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border-color: rgba(37, 99, 235, 0.1); }
            
            /* Card image */
            .card-image-wrap { height: 200px; border-radius: 1rem; overflow: hidden; background: #f1f5f9; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; flex-shrink: 0; }
            .card-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
            
            /* DataView grid overrides */
            .ui-dataview .ui-dataview-content .grid { display: grid !important; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem !important; padding: 0.5rem 0; }
            .ui-dataview .ui-dataview-content .grid > div { width: 100% !important; padding: 0 !important; }
            
            .ui-dataview-content-empty, .ui-datatable-empty-message { text-align: center; padding: 4rem !important; color: #94a3b8; font-weight: 500; }
        </style>
        <p:growl id="growl" showDetail="true" life="3000" />
        <script>
            function findQtyAndAdd(btnId, title, price) {
                // PrimeFaces IDs can be complex, find the sibling spinner input
                let parts = btnId.split(':');
                parts.pop(); // Remove button ID
                let baseId = parts.join(':');
                let qtyInput = document.getElementById(baseId + ':qty_input') || document.getElementById(baseId + ':qty');
                let qty = qtyInput ? qtyInput.value : 1;
                addToGuestCart(title, price, qty);
            }

            function addToGuestCart(title, price, quantity) {
                let cart = JSON.parse(localStorage.getItem('revive_cart') || '[]');
                let qty = parseInt(quantity) || 1;
                cart.push({ title, price, quantity: qty, id: Date.now() });
                localStorage.setItem('revive_cart', JSON.stringify(cart));
                alert(qty + " x " + title + " added to local cart!");
            }
        </script>
    </h:head>
    <h:body>
        <h:form id="navForm">
            <div class="navbar flex justify-content-between align-items-center">
                <a href="index.xhtml" class="brand"><i class="bi bi-recycle mr-2"></i>ReVive</a>
                
                <div class="nav-links">
                    <h:link outcome="index" value="Marketplace" styleClass="nav-item" />
                    
                    <h:panelGroup rendered="#{authBean.loggedIn}">
                        <h:link outcome="seller" value="Sell" styleClass="nav-item" rendered="#{not authBean.admin}" />
                        <h:link outcome="admin" value="Admin Panel" styleClass="nav-item text-red-600 font-bold" rendered="#{authBean.admin}" />
                        
                        <h:link outcome="cart" styleClass="nav-item mr-2" rendered="#{not authBean.admin}">
                            <i class="bi bi-cart3 mr-1"></i>Cart
                        </h:link>
                        <span class="text-xs text-gray-500">Welcome, #{authBean.currentUser.username}</span>
                        <p:commandLink action="#{authBean.logout}" value="Logout" styleClass="nav-item text-red-600 ml-2" />
                    </h:panelGroup>

                    <h:panelGroup rendered="#{!authBean.loggedIn}">
                        <h:link outcome="cart" styleClass="nav-item mr-3">
                            <i class="bi bi-cart3 mr-1"></i>Cart
                        </h:link>
                        <h:link outcome="login" value="Login" styleClass="btn-revive" />
                    </h:panelGroup>
                </div>
            </div>
        </h:form>

        <div class="p-container py-4">
            <ui:insert name="content">Default Content</ui:insert>
        </div>

        <div class="footer">
            <h2 class="text-2xl font-bold mb-3">ReVive</h2>
            <p class="text-gray-400 max-w-lg mx-auto">Connecting passionate buyers with secondhand treasures. Giving products a second life, one click at a time.</p>
            <div class="mt-4 text-sm text-gray-500">© 2026 ReVive Marketplace. All rights reserved.</div>
        </div>
    </h:body>
</html>
