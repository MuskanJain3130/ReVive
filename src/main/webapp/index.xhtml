<?xml version='1.0' encoding='UTF-8' ?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/template.xhtml">
    
    <ui:define name="content">
        <div class="grid justify-content-center">
            <div class="col-12 md:col-10 text-center mb-6">
                <h1 class="text-5xl font-extrabold text-gray-900 mb-2">Sustainable Shopping <span class="text-primary-600">ReVive</span>d</h1>
                <p class="text-xl text-gray-500">Discover quality secondhand treasures at unbeatable prices.</p>
            </div>
            
            <div class="col-12 md:col-10">
                <h:form id="productForm">
                    <p:dataView value="#{productBean.approvedProducts}" var="product" 
                                gridIcon="pi pi-th-large" listIcon="pi pi-bars"
                                layout="grid" paginator="true" rows="12" 
                                gridRowStyleClass="grid row-gap-8 column-gap-4">
                        
                        <p:dataViewGridItem>
                            <div>
                                <div class="card-premium">
                                <!-- Image Section -->
                                    <div class="card-image-wrap">
                                        <h:panelGroup rendered="#{not empty product.imageUrl}">
                                            <img src="images/#{product.imageUrl}" alt="#{product.title}" />
                                        </h:panelGroup>
                                        <h:panelGroup rendered="#{empty product.imageUrl}">
                                            <i class="bi bi-box-seam text-6xl text-gray-300"></i>
                                        </h:panelGroup>
                                    </div>

                                    <!-- Product Info -->
                                    <div class="flex-grow-1">
                                        <div class="flex justify-content-between align-items-center mb-2">
                                            <p:tag value="#{product.productCondition}" severity="warning" styleClass="text-xs font-bold" />
                                            <span class="text-xl font-black text-primary">₹#{product.price}</span>
                                        </div>
                                        
                                        <h2 class="text-lg font-bold text-gray-900 mb-2 line-clamp-1">
                                            #{product.title}
                                        </h2>
                                        
                                        <p class="text-gray-500 text-sm mb-4 line-clamp-2">
                                            #{product.description}
                                        </p>
                                    </div>

                                    <!-- Purchase Actions -->
                                    <div class="mt-auto">
                                        <p:spinner id="qty" min="1" max="10" value="1" styleClass="w-full mb-3" />
                                        
                                        <div class="flex gap-2">
                                            <p:commandButton value="Add" icon="pi pi-cart-plus"
                                                           onclick="findQtyAndAdd(this.id, '#{product.title}', #{product.price}); return false;"
                                                           rendered="#{not authBean.loggedIn}"
                                                           styleClass="ui-button-primary flex-grow-1" />
                                            
                                            <p:commandButton value="Add" icon="pi pi-cart-plus"
                                                           rendered="#{authBean.loggedIn}"
                                                           styleClass="ui-button-primary flex-grow-1" />
                                        </div>
                                        <div class="text-center mt-3">
                                            <span class="text-xs text-gray-400 font-semibold">Seller: @#{product.sellerid.username}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </p:dataViewGridItem>
                    </p:dataView>
                </h:form>
            </div>
        </div>
    </ui:define>
</ui:composition>
